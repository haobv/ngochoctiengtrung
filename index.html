<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÕ NGỌC học TIẾNG TRUNG</title>
<style>
/* ── variables ── */
:root {
  --y:       #eab308;
  --y-light: #fef9c3;
  --y-text:  #713f12;
  --text:    #111827;
  --muted:   #6b7280;
  --border:  #e5e7eb;
  --bg:      #fefce8;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #fef08a;
  color: var(--text);
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.card {
  background: #fff;
  border-radius: 20px;
  padding: 32px 36px;
  width: 100%;
  max-width: 460px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
  border-top: 4px solid var(--y);
}

.meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  font-size: 0.78rem;
  color: var(--muted);
}

.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 28px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--y);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.meaning {
  font-size: 1.9rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 28px;
  color: var(--text);
  line-height: 1.3;
}

.field { margin-bottom: 20px; }

label {
  display: block;
  font-size: 0.68rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 7px;
}

input[type="text"] {
  width: 100%;
  background: #f9fafb;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 1.1rem;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  -webkit-appearance: none;
}

input[type="text"]:focus {
  border-color: var(--y);
  box-shadow: 0 0 0 3px #fef08a;
}
input[type="text"].ok  { border-color: #16a34a; background: #f0fdf4; box-shadow: none; }
input[type="text"].err { border-color: #dc2626; background: #fef2f2; box-shadow: none; }

.fb { font-size: 0.82rem; margin-top: 5px; min-height: 18px; }
.fb.ok  { color: #16a34a; }
.fb.err { color: #dc2626; }

/* Hanzi grid */
.hz-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.hz-btn {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px 8px;
  font-size: 1.75rem;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.1s;
  text-align: center;
  line-height: 1.2;
  touch-action: manipulation;
}

.hz-btn:hover:not(:disabled)  { border-color: var(--y); box-shadow: 0 0 0 3px #fef08a; }
.hz-btn:active:not(:disabled) { transform: scale(0.96); }

.hz-btn.selected {
  border-color: var(--y);
  background: var(--y-light);
  color: var(--y-text);
  box-shadow: 0 0 0 3px #fef08a;
}

.hz-btn.ok     { border-color: #16a34a !important; background: #f0fdf4 !important; color: #15803d !important; box-shadow: none !important; }
.hz-btn.err    { border-color: #dc2626 !important; background: #fef2f2 !important; color: #dc2626 !important; box-shadow: none !important; }
.hz-btn.reveal { border-color: #16a34a !important; background: #f0fdf4 !important; color: #15803d !important; box-shadow: none !important; }
.hz-btn:disabled { cursor: default; }

.fb-hz { font-size: 0.82rem; margin-top: 8px; min-height: 18px; }
.fb-hz.ok  { color: #16a34a; }
.fb-hz.err { color: #dc2626; }

/* Meaning row with TTS button */
.meaning-area {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 28px;
}
.meaning { margin-bottom: 0; }

.speak-btn {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  width: 34px; height: 34px;
  font-size: 0.9rem;
  cursor: pointer;
  flex: none;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s, background 0.15s;
  touch-action: manipulation;
  line-height: 1;
}
.speak-btn:hover  { border-color: var(--y); background: var(--y-light); }
.speak-btn.active { border-color: var(--y); background: var(--y-light); }

/* Example sentence */
.example-box {
  background: #fffbeb;
  border: 1.5px solid #fde68a;
  border-radius: 10px;
  padding: 10px 14px;
  margin-top: 10px;
  animation: fadeIn 0.22s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; } }
.ex-hz { font-size: 1.05rem; color: var(--text); margin-bottom: 2px; }
.ex-py { font-size: 0.78rem; color: var(--muted); margin-bottom: 2px; }
.ex-vi { font-size: 0.8rem; color: #92400e; font-style: italic; }

/* Stats hint on start screen */
.stats-hint { font-size: 0.8rem; color: #a16207; margin-top: 6px; min-height: 18px; }

/* Buttons */
.actions { display: flex; gap: 10px; margin-top: 24px; }

button {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  touch-action: manipulation;
}

button:active { transform: scale(0.97); }

#btn-check { background: var(--y); color: #111; }
#btn-skip  { background: #f3f4f6; color: var(--muted); flex: 0 0 auto; padding: 14px 18px; }
#btn-next  { background: var(--y); color: #111; display: none; }

.score-row { text-align: center; margin-top: 18px; font-size: 0.78rem; color: var(--muted); }
.score-row span { color: #16a34a; font-weight: 700; }

/* Start / Result screens */
#start-card  { text-align: center; }
#result-card { display: none; text-align: center; }

.size-options {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 18px 0 24px;
}

.size-btn {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 6px;
  color: var(--text);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  touch-action: manipulation;
  flex: none;
}

.size-btn:hover    { border-color: var(--y); }
.size-btn.selected { border-color: var(--y); background: var(--y-light); color: var(--y-text); }

/* Exit button */
.top-bar { display: flex; justify-content: flex-start; margin-bottom: 6px; }
.exit-btn {
  background: none; border: none;
  color: #9ca3af; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; padding: 2px 4px;
  touch-action: manipulation;
}
.exit-btn:hover { color: var(--text); }

/* Mode selector */
.mode-options { display: flex; gap: 10px; margin: 8px 0 20px; }
.mode-btn, .content-btn {
  flex: 1;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 8px;
  color: var(--text);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  touch-action: manipulation;
}
.mode-btn:hover:not(:disabled), .content-btn:hover { border-color: var(--y); }
.mode-btn.selected, .content-btn.selected { border-color: var(--y); background: var(--y-light); color: var(--y-text); }
.mode-btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* Speak mode */
.sp-hz {
  font-size: 4.2rem;
  font-weight: 800;
  text-align: center;
  margin: 18px 0 6px;
  letter-spacing: 4px;
  line-height: 1.1;
}
.sp-hz.long { font-size: 2.3rem; letter-spacing: 2px; line-height: 1.45; }
.sp-vi { text-align: center; color: #6b7280; font-size: 1.05rem; margin-bottom: 16px; }
.sp-sample-row { display: flex; justify-content: center; margin-bottom: 26px; }
.sp-sample-btn {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 999px;
  padding: 8px 18px;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  touch-action: manipulation;
}
.sp-sample-btn:hover, .sp-sample-btn.active { border-color: var(--y); background: var(--y-light); }

.sp-mic-area { display: flex; flex-direction: column; align-items: center; gap: 14px; margin: 4px 0 18px; }
.sp-mic {
  width: 96px; height: 96px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: #fff;
  font-size: 2.4rem;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  touch-action: manipulation;
}
.sp-mic:hover:not(:disabled) { border-color: var(--y); background: var(--y-light); }
.sp-mic:disabled { opacity: 0.5; cursor: default; }
.sp-mic.listening { border-color: var(--y); background: var(--y-light); animation: pulse 1s infinite; }
.sp-mic.ok   { border-color: #16a34a; background: #f0fdf4; }
.sp-mic.near { border-color: #eab308; background: #fef9c3; }
.sp-mic.err  { border-color: #dc2626; background: #fef2f2; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 #fde047; } 50% { box-shadow: 0 0 0 12px rgba(253,224,71,0); } }

.sp-fb { text-align: center; font-size: 1rem; font-weight: 600; min-height: 24px; }
.sp-fb.ok   { color: #16a34a; }
.sp-fb.near { color: #a16207; }
.sp-fb.err  { color: #dc2626; }

.sp-compare {
  background: var(--bg, #f9fafb);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px 16px;
  margin: 4px 0 20px;
}
.sp-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 0;
}
.sp-row + .sp-row { border-top: 1px dashed var(--border); }
.sp-lbl { color: #6b7280; font-size: 0.85rem; }
.sp-heard, .sp-answer { font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; }
.sp-answer-wrap { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.2; }
.sp-answer { color: #16a34a; }
.sp-heard .ch-ok,  .sp-answer .ch-ok   { color: #16a34a; }
.sp-heard .ch-bad, .sp-answer .ch-bad  { color: #dc2626; border-bottom: 2px solid #fca5a5; }
.sp-heard .ch-punc,.sp-answer .ch-punc { color: #9ca3af; }
.sp-answer-py { color: #6b7280; font-size: 0.85rem; font-weight: 600; }
.sp-heard.ok   { color: #16a34a; }
.sp-heard.near { color: #a16207; }
.sp-heard.err  { color: #dc2626; }

.sp-warn { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 12px; border-radius: 10px; font-size: 0.85rem; text-align: center; }

/* Result */
.big-pct {
  font-size: 4.5rem;
  font-weight: 800;
  color: var(--y);
  line-height: 1;
  margin: 16px 0 8px;
}

.result-sub { color: var(--muted); margin-bottom: 28px; font-size: 0.9rem; }

#btn-restart { background: #f3f4f6; color: var(--muted); padding: 14px 32px; flex: none; }

/* ── Mobile: full screen ── */
@media (max-width: 540px) {
  body { padding: 0; justify-content: flex-start; background: #fff; }

  .card {
    border-radius: 0;
    box-shadow: none;
    max-width: 100%;
    height: 100svh;
    padding: 20px 20px 36px;
    border-top: 4px solid var(--y);
    display: flex;
    flex-direction: column;
    overflow: auto;
  }

  /* Main card: meaning-area grows to fill vertical space → word shown prominently */
  #main-card .meaning-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0;
    padding: 12px 0;
  }
  #main-card .meaning-area .meaning { font-size: 1.9rem; }

  #main-card .progress-bar { margin-bottom: 0; }
  #main-card .field        { margin-bottom: 14px; }
  #main-card .actions      { margin-top: 16px; }
  #main-card .score-row    { margin-top: 10px; }

  /* Start & result: content centered vertically */
  #start-card  { justify-content: center; }
  #result-card { justify-content: center; }

  #start-card .size-options { margin: 14px 0 20px; gap: 6px; }
  #start-card .size-btn     { padding: 15px 4px; font-size: 0.9rem; }
  #start-card .actions      { margin-top: 0; }

  #result-card .big-pct    { font-size: 3.8rem; }
  #result-card .result-sub { margin-bottom: 20px; }
  #result-card .actions    { margin-top: 0; flex-direction: column; }

  .hz-btn { font-size: 1.6rem; padding: 20px 8px; }
  .hz-grid { gap: 8px; }

  input[type="text"] { font-size: 1rem; padding: 13px 14px; }

  button { padding: 15px; font-size: 0.95rem; }
}
</style>
</head>
<body>

<div class="card" id="start-card">
  <div style="font-size:1.6rem;font-weight:800;margin-bottom:6px">Võ Ngọc học Tiếng Trung</div>
  <div style="color:#6b7280;font-size:0.85rem;margin-bottom:6px">HSK 1 · 150 từ vựng</div>
  <div class="stats-hint" id="stats-hint"></div>
  <div style="margin-bottom:16px"></div>

  <label>Chế độ luyện tập</label>
  <div class="mode-options">
    <button class="mode-btn selected" data-mode="learn">✍️ Học chữ</button>
    <button class="mode-btn" data-mode="speak" id="mode-speak-btn">🎤 Tập nói</button>
  </div>
  <div class="sp-warn" id="speak-warn" style="display:none;margin-bottom:18px">
    Chế độ tập nói cần trình duyệt hỗ trợ nhận diện giọng nói — hãy dùng <b>Chrome</b> hoặc <b>Edge</b>.
  </div>

  <div id="content-options" style="display:none">
    <label>Nội dung tập nói</label>
    <div class="mode-options">
      <button class="content-btn selected" data-content="word">🔤 Từ đơn</button>
      <button class="content-btn" data-content="sentence">💬 Mẫu câu</button>
    </div>
  </div>

  <label>Số từ mỗi lần luyện</label>
  <div class="size-options">
    <button class="size-btn" data-n="10">10</button>
    <button class="size-btn selected" data-n="20">20</button>
    <button class="size-btn" data-n="50">50</button>
    <button class="size-btn" data-n="0">Tất cả</button>
  </div>

  <div class="actions" style="justify-content:center">
    <button id="btn-go" style="background:#6366f1;color:white">Bắt đầu →</button>
  </div>
</div>

<div class="card" id="main-card" style="display:none">
  <div class="top-bar"><button class="exit-btn" id="btn-exit">← Thoát</button></div>
  <div class="meta">
    <span id="progress-text">1 / 150</span>
    <span id="score-text">✓ 0</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="meaning-area">
    <div class="meaning" id="meaning">—</div>
    <button class="speak-btn" id="btn-speak" title="Phát âm">🔊</button>
  </div>

  <div class="field">
    <label>Phiên âm · Pinyin</label>
    <input type="text" id="inp-py"
           placeholder="vd: nǐ hǎo  hoặc  ni3 hao3"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="fb" id="fb-py"></div>
  </div>

  <div class="field">
    <label>Hán tự · 汉字 — chọn đáp án đúng</label>
    <div class="hz-grid" id="hz-grid"></div>
    <div class="fb-hz" id="fb-hz"></div>
    <div class="example-box" id="example-box" style="display:none">
      <div class="ex-hz" id="ex-hz"></div>
      <div class="ex-py" id="ex-py"></div>
      <div class="ex-vi" id="ex-vi"></div>
    </div>
  </div>

  <div class="actions">
    <button id="btn-skip">Bỏ qua</button>
    <button id="btn-check">Kiểm tra</button>
    <button id="btn-next">Tiếp theo →</button>
  </div>

  <div class="score-row">Đúng cả hai: <span id="score-val">0</span></div>
</div>

<div class="card" id="speak-card" style="display:none">
  <div class="top-bar"><button class="exit-btn" id="sp-exit">← Thoát</button></div>
  <div class="meta">
    <span id="sp-progress-text">1 / 150</span>
    <span id="sp-score-text">✓ 0</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="sp-progress-fill" style="width:0%"></div>
  </div>

  <div class="sp-hz" id="sp-hz">—</div>
  <div class="sp-vi" id="sp-vi">—</div>
  <div class="sp-sample-row">
    <button class="sp-sample-btn" id="sp-listen-sample">🔊 Nghe mẫu</button>
  </div>

  <div class="sp-mic-area">
    <button class="sp-mic" id="sp-mic" title="Bấm để nói">🎤</button>
    <div class="sp-fb" id="sp-fb">Bấm micro rồi đọc to chữ trên</div>
  </div>

  <div class="sp-compare" id="sp-compare" style="display:none">
    <div class="sp-row">
      <span class="sp-lbl">Bạn nói</span>
      <span class="sp-answer-wrap">
        <b class="sp-heard" id="sp-heard">—</b>
        <span class="sp-answer-py" id="sp-heard-py">—</span>
      </span>
    </div>
    <div class="sp-row">
      <span class="sp-lbl">Đáp án</span>
      <span class="sp-answer-wrap">
        <b class="sp-answer" id="sp-answer">—</b>
        <span class="sp-answer-py" id="sp-answer-py">—</span>
      </span>
    </div>
  </div>

  <div class="actions">
    <button id="sp-skip">Bỏ qua</button>
    <button id="sp-next" style="display:none;background:var(--y);color:#111">Tiếp theo →</button>
  </div>

  <div class="score-row">Nói đúng: <span id="sp-score-val">0</span></div>
</div>

<div class="card" id="result-card">
  <div style="color:#9ca3af;font-size:0.9rem">Xong rồi!</div>
  <div class="big-pct" id="final-pct">—</div>
  <div class="result-sub" id="final-sub">— / — từ đúng hoàn toàn</div>
  <div class="actions" style="justify-content:center;flex-direction:column;gap:10px">
    <button id="btn-retry-wrong" style="display:none;background:#ef4444;color:white">—</button>
    <button id="btn-restart" style="background:#374151;color:#9ca3af">Làm lại từ đầu (150 từ)</button>
  </div>
</div>

<script>
const VOCAB = [
  // A
  { vi:"yêu",                  py:"ài",          hz:"爱"    },
  // B
  { vi:"tám",                  py:"bā",          hz:"八"    },
  { vi:"bố / ba",              py:"bàba",        hz:"爸爸"  },
  { vi:"cái cốc / ly",         py:"bēizi",       hz:"杯子"  },
  { vi:"Bắc Kinh",             py:"Běijīng",     hz:"北京"  },
  { vi:"quyển (lượng từ sách)",py:"běn",         hz:"本"    },
  { vi:"không có gì (đáp lại cảm ơn)", py:"bú kèqi", hz:"不客气"},
  { vi:"không (phủ định)",     py:"bù",          hz:"不"    },
  // C
  { vi:"rau / món ăn",         py:"cài",         hz:"菜"    },
  { vi:"trà",                  py:"chá",         hz:"茶"    },
  { vi:"ăn",                   py:"chī",         hz:"吃"    },
  { vi:"taxi",                 py:"chūzūchē",    hz:"出租车"},
  // D
  { vi:"gọi điện thoại",       py:"dǎ diànhuà",  hz:"打电话"},
  { vi:"lớn / to",             py:"dà",          hz:"大"    },
  { vi:"(trợ từ sở hữu)",      py:"de",          hz:"的"    },
  { vi:"giờ (H giờ) / điểm",  py:"diǎn",        hz:"点"    },
  { vi:"máy tính",             py:"diànnǎo",     hz:"电脑"  },
  { vi:"ti vi",                py:"diànshì",     hz:"电视"  },
  { vi:"phim điện ảnh",        py:"diànyǐng",    hz:"电影"  },
  { vi:"đồ vật / thứ",         py:"dōngxi",      hz:"东西"  },
  { vi:"đều / cũng đều",       py:"dōu",         hz:"都"    },

const TONE = {
  ā:'a',á:'a',ǎ:'a',à:'a',
  ē:'e',é:'e',ě:'e',è:'e',
  ī:'i',í:'i',ǐ:'i',ì:'i',
  ō:'o',ó:'o',ǒ:'o',ò:'o',
  ū:'u',ú:'u',ǔ:'u',ù:'u',
  ǖ:'v',ǘ:'v',ǚ:'v',ǜ:'v',ü:'v',
};

function normPy(s) {
  return s.toLowerCase()
    .split('').map(c => TONE[c] ?? c).join('')
    .replace(/[1-5]/g, '')
    .replace(/\s+/g, '');
}

function shuffle(a) {
  const r = [...a];
  for (let i = r.length - 1; i > 0; i--) {
    const j = Math.random() * (i + 1) | 0;
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}

// ── Feature 1: TTS ──────────────────────────────────────────────────
let _zhVoice = null;
if (window.speechSynthesis) {
  const _load = () => {
    const all = speechSynthesis.getVoices();
    const zh   = all.filter(v => /^zh/i.test(v.lang));
    const zhCN = zh.filter(v => /^zh[-_]CN/i.test(v.lang));
    const pool = zhCN.length ? zhCN : zh;
    const FEMALE = /tingting|婷婷|sin-?ji|mei-?jia|ya-?ting|xiaoxiao|huihui|yaoyao|female|nǚ|女/i;
    const MALE   = /kangkang|yunyang|male/i;
    _zhVoice = pool.find(v => FEMALE.test(v.name))     // ưu tiên giọng nữ
            || pool.find(v => !MALE.test(v.name))      // tránh giọng nam đã biết
            || pool[0] || null;
  };
  _load();
  speechSynthesis.onvoiceschanged = _load;
}

function _speakNative(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(text);
    if (_zhVoice) { u.voice = _zhVoice; u.lang = _zhVoice.lang; } else { u.lang = 'zh-CN'; }
    u.rate = 0.85;
    speechSynthesis.speak(u);
  }, 50);
}

function speak(text) {
  const btn = $('btn-speak');
  const done = () => btn && btn.classList.remove('active');
  btn && btn.classList.add('active');
  // Google Translate TTS — works on all devices, no voice pack needed, requires internet
  const url = 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=zh-CN&q=' + encodeURIComponent(text);
  const audio = new Audio(url);
  audio.referrerPolicy = 'no-referrer';
  audio.onended = done;
  audio.onerror = () => { done(); _speakNative(text); };
  audio.play().catch(() => { done(); _speakNative(text); });
}

// ── Feature 2: localStorage stats ───────────────────────────────────
function loadStats() {
  try { return JSON.parse(localStorage.getItem('hsk1_stats') || '{}'); } catch { return {}; }
}
function saveStats(s) { try { localStorage.setItem('hsk1_stats', JSON.stringify(s)); } catch {} }
function recordResult(hz, correct) {
  const s = loadStats();
  if (!s[hz]) s[hz] = { r: 0, w: 0 };
  correct ? s[hz].r++ : s[hz].w++;
  saveStats(s);
}

function buildWeightedDeck(cards) {
  const stats = loadStats();
  const scored = cards.map(c => {
    const s     = stats[c.hz];
    const total = s ? s.r + s.w : 0;
    const err   = total > 0 ? s.w / total : 0.4;  // unseen → medium priority
    return { c, score: err + Math.random() * 0.15 };
  });
  scored.sort((a, b) => b.score - a.score);
  const pool = scored.map(x => x.c);
  return batchSize > 0 ? pool.slice(0, batchSize) : pool;
}

function updateStatsDisplay() {
  const s = loadStats();
  const entries = Object.entries(s);
  if (entries.length === 0) { $('stats-hint').textContent = ''; return; }
  const hard = entries.filter(([, v]) => v.w > v.r).length;
  $('stats-hint').textContent = `Đã học: ${entries.length} từ · Cần ôn: ${hard} từ`;
}

// ── Feature 3: example sentences ────────────────────────────────────
function showExample(card) {
  const ex = EXAMPLES[card.hz];
  if (!ex) { $('example-box').style.display = 'none'; return; }
  $('ex-hz').textContent = ex.hz;
  $('ex-py').textContent = ex.py;
  $('ex-vi').textContent = '→ ' + ex.vi;
  $('example-box').style.display = 'block';
}

function makeCandidates(card) {
  const chars = [...card.hz];
  const seen  = new Set([card.hz]);
  const pool  = [];

  // Substitute one character at a time with phonetic alternatives
  for (let i = 0; i < chars.length; i++) {
    const alts = shuffle([...(CHAR_ALTS[chars[i]] || [])]);
    for (const alt of alts) {
      const d = chars.map((c, j) => j === i ? alt : c).join('');
      if (!seen.has(d)) { seen.add(d); pool.push(d); }
      if (pool.length >= 6) break;
    }
    if (pool.length >= 6) break;
  }

  // Fall back to random vocab words if not enough phonetic options
  if (pool.length < 3) {
    const extra = shuffle(VOCAB.filter(v => v.hz !== card.hz && !seen.has(v.hz)))
      .slice(0, 3 - pool.length)
      .map(v => v.hz);
    pool.push(...extra);
  }

  return shuffle([card.hz, ...shuffle(pool).slice(0, 3)])
    .map(hz => ({ hz, correct: hz === card.hz }));
}

function renderCandidates() {
  const grid = $('hz-grid');
  grid.innerHTML = '';
  candidates.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'hz-btn';
    btn.textContent = c.hz;
    btn.dataset.hz = c.hz;
    btn.addEventListener('click', () => selectHz(c.hz));
    grid.appendChild(btn);
  });
}

function selectHz(hz) {
  if (done) return;
  selectedHz = hz;
  $('hz-grid').querySelectorAll('.hz-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.hz === hz);
  });
}

function hideAllCards() {
  $('start-card').style.display  = 'none';
  $('main-card').style.display   = 'none';
  $('speak-card').style.display  = 'none';
  $('result-card').style.display = 'none';
}

function showCurrent() {
  if (mode === 'speak') {
    $('speak-card').style.display = 'block';
    renderSpeak();
  } else {
    $('main-card').style.display = 'block';
    render();
  }
}

function showStart() {
  hideAllCards();
  $('start-card').style.display = 'block';
  updateStatsDisplay();
}

function exitToHome() {
  if (typeof stopRecog === 'function') stopRecog();
  if (window.speechSynthesis) speechSynthesis.cancel();
  showStart();
}

function startDeck(cards) {
  deck       = buildWeightedDeck(cards);
  idx        = 0;
  score      = 0;
  done       = false;
  wrongCards = [];
  hideAllCards();
  showCurrent();
}

function start() {
  const src = (mode === 'speak' && speakContent === 'sentence') ? SENTENCES : VOCAB;
  startDeck(src);
}
function startWrong() {
  const tmp = wrongCards;   // save before reset
  batchSize = 0;            // retry ALL wrong cards
  wrongCards = [];
  deck       = shuffle([...tmp]);
  idx        = 0;
  score      = 0;
  done       = false;
  hideAllCards();
  showCurrent();
}

function render() {
  const c = deck[idx];
  selectedHz = null;
  done = false;

  $('meaning').textContent       = c.vi;
  $('inp-py').value              = '';
  $('inp-py').className          = '';
  $('fb-py').textContent         = '';
  $('fb-py').className           = 'fb';
  $('fb-hz').textContent         = '';
  $('fb-hz').className           = 'fb-hz';
  $('example-box').style.display = 'none';
  $('btn-check').style.display   = '';
  $('btn-skip').style.display    = '';
  $('btn-next').style.display    = 'none';
  $('progress-text').textContent = `${idx + 1} / ${deck.length}`;
  $('progress-fill').style.width = `${idx / deck.length * 100}%`;
  $('score-val').textContent     = score;
  $('score-text').textContent    = `✓ ${score}`;

  candidates = makeCandidates(c);
  renderCandidates();
  $('inp-py').focus();
}

function check() {
  if (done) return;
  done = true;

  const c   = deck[idx];
  const py  = $('inp-py').value.trim();
  const pyOk = normPy(py) === normPy(c.py);
  const hzOk = selectedHz === c.hz;

  // pinyin result
  if (pyOk) {
    $('fb-py').textContent = '✓ Đúng';
    $('fb-py').className   = 'fb ok';
    $('inp-py').className  = 'ok';
  } else {
    $('fb-py').textContent = `✗  Đáp án: ${c.py}`;
    $('fb-py').className   = 'fb err';
    $('inp-py').className  = 'err';
  }

  // hanzi: color each button
  $('hz-grid').querySelectorAll('.hz-btn').forEach(btn => {
    btn.disabled = true;
    const isCorrect = btn.dataset.hz === c.hz;
    const isSelected = btn.dataset.hz === selectedHz;
    if (isCorrect && isSelected) btn.classList.add('ok');
    else if (!isCorrect && isSelected) btn.classList.add('err');
    else if (isCorrect) btn.classList.add('reveal');
    btn.classList.remove('selected');
  });

  if (hzOk) {
    $('fb-hz').textContent = '✓ Đúng';
    $('fb-hz').className   = 'fb-hz ok';
  } else if (!selectedHz) {
    $('fb-hz').textContent = `✗  Chưa chọn — đáp án: ${c.hz}`;
    $('fb-hz').className   = 'fb-hz err';
  } else {
    $('fb-hz').textContent = `✗  Đáp án: ${c.hz}`;
    $('fb-hz').className   = 'fb-hz err';
  }

  if (pyOk && hzOk) score++;
  else wrongCards.push(deck[idx]);
  recordResult(c.hz, pyOk && hzOk);
  showExample(c);
  $('score-val').textContent  = score;
  $('score-text').textContent = `✓ ${score}`;

  $('btn-check').style.display = 'none';
  $('btn-skip').style.display  = 'none';
  $('btn-next').style.display  = 'block';
  $('btn-next').focus();
}

function skip() {
  if (done) return;
  done = true;

  const c = deck[idx];
  $('fb-py').textContent = `→ ${c.py}`;
  $('fb-py').className   = 'fb err';

  $('hz-grid').querySelectorAll('.hz-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.hz === c.hz) btn.classList.add('reveal');
    btn.classList.remove('selected');
  });
  $('fb-hz').textContent = `→ ${c.hz}`;
  $('fb-hz').className   = 'fb-hz err';

  wrongCards.push(c);
  recordResult(c.hz, false);
  showExample(c);

  $('btn-check').style.display = 'none';
  $('btn-skip').style.display  = 'none';
  $('btn-next').style.display  = 'block';
  $('btn-next').focus();
}

function next() {
  idx++;
  if (idx >= deck.length) showResult();
  else showCurrent();
}

function showResult() {
  const pct = Math.round(score / deck.length * 100);
  $('final-pct').textContent  = pct + '%';
  const unit = (mode === 'speak' && speakContent === 'sentence') ? 'câu' : 'từ';
  $('final-sub').textContent  = mode === 'speak'
    ? `${score} / ${deck.length} ${unit} nói đúng`
    : `${score} / ${deck.length} từ đúng hoàn toàn`;
  $('main-card').style.display   = 'none';
  $('speak-card').style.display  = 'none';
  $('result-card').style.display = 'block';
  if (wrongCards.length > 0) {
    $('btn-retry-wrong').textContent  = `Luyện lại ${wrongCards.length} câu sai`;
    $('btn-retry-wrong').style.display = 'block';
  } else {
    $('btn-retry-wrong').style.display = 'none';
  }
}

  if (!SPEECH_OK) return null;
  const r = new SR_API();

  r.maxAlternatives = 5;

  clearTimeout(_recogTimer);
  if (_recog) { try { _recog.abort(); } catch {} _recog = null; }
}

  '我':'wǒ','手':'shǒu','打':'dǎ','文':'wén','日':'rì','时':'shí','明':'míng','星':'xīng','是':'shì','晚':'wǎn',
  '最':'zuì','月':'yuè','有':'yǒu','朋':'péng','服':'fú','期':'qī','本':'běn','机':'jī','来':'lái','杯':'bēi',
  '果':'guǒ','校':'xiào','样':'yàng','桌':'zhuō','椅':'yǐ','欢':'huān','气':'qì','水':'shuǐ','汉':'hàn','没':'méi',
  '洗':'xǐ','漂':'piào','点':'diǎn','热':'rè','爱':'ài','爸':'bà','狗':'gǒu','猫':'māo','现':'xiàn','生':'shēng',
  '电':'diàn','的':'de','看':'kàn','真':'zhēn','睡':'shuì','租':'zū','等':'děng','米':'mǐ','系':'xì','给':'gěi',
  '老':'lǎo','能':'néng','脑':'nǎo','苹':'píng','茶':'chá','菜':'cài','衣':'yī','西':'xī','见':'jiàn','视':'shì',
  '觉':'jiào','认':'rèn','识':'shí','话':'huà','语':'yǔ','说':'shuō','请':'qǐng','读':'dú','谁':'shuí','谢':'xiè',
  '贵':'guì','走':'zǒu','起':'qǐ','越':'yuè','车':'chē','近':'jìn','这':'zhè','遍':'biàn','那':'nà','都':'dōu',
  '里':'lǐ','钟':'zhōng','钱':'qián','门':'mén','问':'wèn','间':'jiān','院':'yuàn','雨':'yǔ','面':'miàn','音':'yīn',
  '飞':'fēi','饭':'fàn','馆':'guǎn','高':'gāo'
};

// Pinyin theo cả cụm (ưu tiên dùng để có thanh điệu/âm nhẹ chuẩn)
const _wordPy = {};
[...VOCAB, ...SENTENCES].forEach(v => { _wordPy[v.hz] = v.py; });
Object.values(EXAMPLES).forEach(e => { _wordPy[e.hz] = e.py; });

function hzToPy(text) {
  const t = normHz(text);
  if (!t) return '';
  if (_wordPy[t]) return _wordPy[t];
  return [...t].map(ch => CHAR_PY[ch] || PY_DICT[ch] || ch).join(' ');
}

// LCS giữa "bạn nói" (h) và "đáp án" (t): đánh dấu chữ khớp ở cả hai phía
function lcsFlags(h, t) {
  const H = [...h], T = [...t];
  const dp = Array.from({ length: H.length + 1 }, () => new Array(T.length + 1).fill(0));
  for (let i = 1; i <= H.length; i++)
    for (let j = 1; j <= T.length; j++)
      dp[i][j] = H[i - 1] === T[j - 1] ? dp[i - 1][j - 1] + 1 : Math.max(dp[i - 1][j], dp[i][j - 1]);
  const hOk = new Array(H.length).fill(false), tOk = new Array(T.length).fill(false);
  let i = H.length, j = T.length;
  while (i > 0 && j > 0) {
    if (H[i - 1] === T[j - 1]) { hOk[i - 1] = tOk[j - 1] = true; i--; j--; }
    else if (dp[i - 1][j] >= dp[i][j - 1]) i--; else j--;
  }
  return { hOk, tOk };
}

// Dựng HTML có tô màu đúng/sai theo mảng cờ (mỗi chữ Hán 1 cờ)
function renderColored(str, flags) {
  let k = 0, html = '';
  for (const ch of str) {
    if (/[一-鿿]/.test(ch)) {
      const ok = flags[k++];
      html += `<span class="${ok ? 'ch-ok' : 'ch-bad'}">${ch}</span>`;
    } else {
      html += `<span class="ch-punc">${ch}</span>`;
    }
  }
  return html;
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  let prev = Array.from({ length: n + 1 }, (_, i) => i);
  for (let i = 1; i <= m; i++) {
    let cur = [i];
    for (let j = 1; j <= n; j++) {
      cur[j] = a[i - 1] === b[j - 1]
        ? prev[j - 1]
        : 1 + Math.min(prev[j], cur[j - 1], prev[j - 1]);
    }
    prev = cur;
  }
  return prev[n];
}

function renderSpeak() {
  const c = deck[idx];
  done = false;
  graded = false;
  $('sp-hz').textContent          = c.hz;
  $('sp-hz').className             = [...c.hz].length > 4 ? 'sp-hz long' : 'sp-hz';
  $('sp-vi').textContent          = c.vi;
  $('sp-fb').textContent          = 'Bấm micro rồi đọc to chữ trên';
  $('sp-fb').className            = 'sp-fb';
  $('sp-compare').style.display   = 'none';
  $('sp-mic').className           = 'sp-mic';
  $('sp-mic').disabled            = false;
  $('sp-skip').style.display      = '';
  $('sp-next').style.display      = 'none';
  $('sp-progress-text').textContent = `${idx + 1} / ${deck.length}`;
  $('sp-progress-fill').style.width = `${idx / deck.length * 100}%`;
  $('sp-score-text').textContent  = `✓ ${score}`;
  $('sp-score-val').textContent   = score;
}

function listen() {
  if (graded) return;
  stopRecog();                       // dọn phiên cũ nếu còn treo
  const r = _recog = makeRecognizer();
  if (!r) return;
  $('sp-mic').className   = 'sp-mic listening';
  $('sp-fb').textContent  = '🎙️ Đang nghe… đọc to lên nào';
  $('sp-fb').className    = 'sp-fb';

  r.onresult = e => {
    clearTimeout(_recogTimer);
    gradeSpeak([...e.results[0]].map(a => a.transcript));
  };
  r.onerror  = e => {
    clearTimeout(_recogTimer);
    if (graded) return;
    $('sp-mic').className = 'sp-mic';
    $('sp-fb').textContent = e.error === 'no-speech'
      ? 'Không nghe thấy gì — bấm micro thử lại'
      : (e.error === 'not-allowed' ? 'Bạn cần cho phép dùng micro' : 'Lỗi micro: ' + e.error);
    $('sp-fb').className = 'sp-fb err';
  };
  r.onend = () => {
    clearTimeout(_recogTimer);
    if (!graded && $('sp-mic').classList.contains('listening')) {
      $('sp-mic').className = 'sp-mic';
      $('sp-fb').textContent = 'Chưa nghe rõ — bấm micro thử lại';
      $('sp-fb').className = 'sp-fb';
    }
  };

  // Watchdog: nếu 8s không có kết quả thì dừng để không kẹt
  _recogTimer = setTimeout(() => { try { r.stop(); } catch {} }, 8000);
  try { r.start(); }
  catch {
    clearTimeout(_recogTimer);
    $('sp-mic').className = 'sp-mic';
    $('sp-fb').textContent = 'Không khởi động được micro — bấm thử lại';
    $('sp-fb').className = 'sp-fb err';
  }
}

function gradeSpeak(alts) {
  stopRecog();
  const c       = deck[idx];
  const target  = normHz(c.hz);
  // chọn phương án nhận diện khớp nhất
  let bestRaw = alts[0] || '', dist = Infinity;
  for (const a of alts) {
    const d = levenshtein(normHz(a), target);
    if (d < dist) { dist = d; bestRaw = a; }
    if (d === 0) break;
  }
  // ngưỡng "gần đúng" giãn theo độ dài: câu dài cho phép lệch nhiều hơn
  const tol   = Math.max(1, Math.floor(target.length * 0.25));
  const exact = dist === 0;
  const near  = !exact && target.length > 0 && dist <= tol;
  const pass  = exact || near;

  const cls = exact ? 'ok' : near ? 'near' : 'err';
  const shown = bestRaw || '—';
  $('sp-mic').className   = 'sp-mic ' + cls;
  $('sp-fb').className    = 'sp-fb ' + cls;
  $('sp-fb').textContent  = exact ? '✓ Chính xác!'
                          : near  ? '~ Gần đúng — đọc lại cho chuẩn nhé'
                          :         '✗ Chưa đúng, thử lại nào';
  const { hOk, tOk } = lcsFlags(normHz(shown), target);
  $('sp-heard').className   = 'sp-heard';
  $('sp-heard').innerHTML   = renderColored(shown, hOk);
  $('sp-heard-py').textContent = exact ? c.py : hzToPy(shown);
  $('sp-answer').innerHTML  = renderColored(c.hz, tOk);
  $('sp-answer-py').textContent = c.py;
  $('sp-compare').style.display = 'block';

  // Score only the FIRST attempt; "Nói lại" sau đó chỉ cập nhật phản hồi
  if (!graded) {
    graded = true;
    done   = true;
    if (pass) score++; else wrongCards.push(c);
    recordResult(c.hz, pass);
    $('sp-score-text').textContent = `✓ ${score}`;
    $('sp-score-val').textContent  = score;
    $('sp-skip').style.display = 'none';
    $('sp-next').style.display = 'block';
    $('sp-next').focus();
  }
}

function skipSpeak() {
  if (graded) return;
  stopRecog();
  graded = true;
  done   = true;
  const c = deck[idx];
  $('sp-fb').textContent = 'Đã bỏ qua';
  $('sp-fb').className   = 'sp-fb err';
  $('sp-mic').className  = 'sp-mic';
  $('sp-heard').textContent = '—';
  $('sp-heard').className   = 'sp-heard err';
  $('sp-heard-py').textContent = '';
  $('sp-answer').textContent = c.hz;
  $('sp-answer-py').textContent = c.py;
  $('sp-compare').style.display = 'block';
  wrongCards.push(c);
  recordResult(c.hz, false);
  $('sp-skip').style.display = 'none';
  $('sp-next').style.display = 'block';
  $('sp-next').focus();
}

// Size selector
document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    batchSize = +btn.dataset.n;
  });
});

// Mode selector
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.disabled) return;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    mode = btn.dataset.mode;
    $('content-options').style.display = mode === 'speak' ? 'block' : 'none';
  });
});

// Content selector (chỉ ở chế độ tập nói)
document.querySelectorAll('.content-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.content-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    speakContent = btn.dataset.content;
  });
});

$('btn-go').addEventListener('click', start);
$('btn-check').addEventListener('click', check);
$('btn-skip').addEventListener('click',  skip);
$('btn-speak').addEventListener('click', () => { if (deck[idx]) speak(deck[idx].hz); });
$('btn-next').addEventListener('click',  next);
$('btn-restart').addEventListener('click', showStart);
$('btn-retry-wrong').addEventListener('click', startWrong);
$('btn-exit').addEventListener('click', exitToHome);

// Speak mode controls
$('sp-mic').addEventListener('click', listen);
$('sp-skip').addEventListener('click', skipSpeak);
$('sp-next').addEventListener('click', next);
$('sp-exit').addEventListener('click', exitToHome);
$('sp-listen-sample').addEventListener('click', () => { if (deck[idx]) speak(deck[idx].hz); });

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (mode === 'speak') {
    if ($('speak-card').style.display === 'none') return;
    if (graded) next(); else listen();
    return;
  }
  if (!done) check(); else next();
});

// Disable speak mode if browser has no speech recognition
if (!SPEECH_OK) {
  const sb = $('mode-speak-btn');
  sb.disabled = true;
  $('speak-warn').style.display = 'block';
}

// show start screen on load
updateStatsDisplay();
</script>
